name: TestFlight beta

# Manual trigger only for now (workflow_dispatch). Once verified, can
# auto-run on push to main by enabling the on.push block below.
on:
  workflow_dispatch:
    inputs:
      changelog:
        description: "Beta release notes (optional)"
        required: false
        default: "Automated CI build"
  # push:
  #   branches: [main]
  #   paths:
  #     - "ios/**"
  #     - ".github/workflows/testflight.yml"

permissions:
  contents: read

jobs:
  testflight:
    name: Build & upload to TestFlight
    runs-on: macos-26
    environment: testflight
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          ls /Applications | grep -i Xcode || true
          # macos-26 default Xcode should be 26.x already, but be explicit
          sudo xcode-select -s /Applications/Xcode.app || true
          xcodebuild -version

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
          ruby -v

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Install fastlane
        run: brew install fastlane

      - name: Configure SSH for fastlane match cert storage
        # Load the deploy key for arunjeetsingh/token-tracker-certs into
        # ssh-agent so `match` can clone (and on first run, push to) the
        # private cert storage repo over SSH. The key is repo-scoped and
        # has no access to anything else.
        env:
          MATCH_DEPLOY_KEY: ${{ secrets.MATCH_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -t ed25519,rsa github.com >> ~/.ssh/known_hosts 2>/dev/null
          eval "$(ssh-agent -s)"
          # Persist agent env so subsequent steps in the same job can use it.
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"
          printf '%s\n' "$MATCH_DEPLOY_KEY" | ssh-add -
          ssh-add -l

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Run fastlane beta
        working-directory: ios
        env:
          CI: "true"
          APP_IDENTIFIER:                    ${{ vars.APP_IDENTIFIER }}
          APPLE_TEAM_ID:                     ${{ vars.APPLE_TEAM_ID }}
          FASTLANE_TEAM_ID:                  ${{ vars.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_API_KEY_ID:      ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID:   ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_B64:     ${{ secrets.APP_STORE_CONNECT_API_KEY_B64 }}
          MATCH_PASSWORD:                    ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BRANCH:                  main
          FASTLANE_DISABLE_COLORS:           "1"
          FASTLANE_HIDE_TIMESTAMP:           "1"
          LANG:                              "en_US.UTF-8"
          LC_ALL:                            "en_US.UTF-8"
          BETA_CHANGELOG:                    ${{ github.event.inputs.changelog }}
        run: fastlane beta
