name: Android release AAB

# Manual trigger for now. Builds a signed release App Bundle (.aab), bumps the
# patch component of tokencounter.versionName in android/gradle.properties, and
# commits the bump back to main with [skip ci] — mirrors the iOS TestFlight
# MARKETING_VERSION flow. The signed .aab is uploaded as a build artifact; Play
# Store upload can be wired later via a service-account JSON once the app
# exists in Play Console.
on:
  workflow_dispatch:
    inputs:
      changelog:
        description: "Release notes (optional)"
        required: false
        default: "Automated CI build"

permissions:
  contents: write

jobs:
  release-aab:
    name: Build & sign release AAB
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Bump patch version (tokencounter.versionName)
        id: bump
        working-directory: android
        run: |
          set -euo pipefail
          CUR=$(grep -E '^tokencounter\.versionName=' gradle.properties | head -1 | sed -E 's/^tokencounter\.versionName=//')
          echo "Current version: $CUR"
          IFS='.' read -r MA MI PA <<< "$CUR"
          PA=$((PA + 1))
          NEW="${MA}.${MI}.${PA}"
          echo "New version: $NEW"
          sed -i -E "s/^(tokencounter\.versionName=).*/\1${NEW}/" gradle.properties
          echo "version=$NEW" >> "$GITHUB_OUTPUT"

      - name: Decode upload keystore
        working-directory: android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > upload-keystore.jks
          echo "ANDROID_KEYSTORE_FILE=upload-keystore.jks" >> "$GITHUB_ENV"

      - name: Build signed release AAB
        working-directory: android
        env:
          ANDROID_KEYSTORE_FILE: upload-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:bundleRelease --stacktrace

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: tokencounter-release-${{ steps.bump.outputs.version }}
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Clean up keystore
        if: always()
        working-directory: android
        run: rm -f upload-keystore.jks

      - name: Commit version bump back to main
        if: success()
        run: |
          set -euo pipefail
          NEW="${{ steps.bump.outputs.version }}"
          # Re-apply ONLY the version line on a clean checkout so the commit is
          # a minimal one-line bump (discard keystore/build mutations).
          git checkout -- android/gradle.properties
          sed -i -E "s/^(tokencounter\.versionName=).*/\1${NEW}/" android/gradle.properties
          if git diff --quiet -- android/gradle.properties; then
            echo "No version change to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add android/gradle.properties
          git commit -m "chore(android): bump versionName to $NEW [skip ci]"
          git push origin HEAD:main
