name: Android release AAB

# Manual trigger for now. Bumps the patch component of tokencounter.versionName
# in android/gradle.properties, commits the bump back to main with [skip ci]
# FIRST, then builds a signed release App Bundle (.aab) from that committed
# version, uploads it as a build artifact, and (optionally) publishes it to the
# Google Play internal testing track via the play-publisher service account.
# Committing before building keeps release artifacts one-to-one with committed
# versions. Mirrors the iOS TestFlight MARKETING_VERSION flow.
on:
  workflow_dispatch:
    inputs:
      changelog:
        description: "Release notes (optional)"
        required: false
        default: "Automated CI build"
      track:
        description: "Play track to publish to"
        required: false
        default: "internal"
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      publish_to_play:
        description: "Upload the AAB to Google Play"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

# Serialize releases: only one release build at a time, and never cancel an
# in-flight one (a cancelled run could leave a pushed version bump with no
# matching artifact). Queued runs start after the prior run pushes its bump,
# so each reads a distinct current version.
concurrency:
  group: android-release
  cancel-in-progress: false

jobs:
  release-aab:
    name: Build & sign release AAB
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Bump the patch version and push it to main BEFORE building, so the
      # committed version is the single source of truth for the artifact below.
      - name: Bump patch version and commit to main
        id: bump
        working-directory: android
        run: |
          set -euo pipefail
          CUR=$(grep -E '^tokencounter\.versionName=' gradle.properties | head -1 | sed -E 's/^tokencounter\.versionName=//')
          echo "Current version: $CUR"
          # Require a 3-component semver (major.minor.patch).
          if ! printf '%s' "$CUR" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::tokencounter.versionName must be 3-component semver (got '$CUR')"
            exit 1
          fi
          IFS='.' read -r MA MI PA <<< "$CUR"
          PA=$((PA + 1))
          NEW="${MA}.${MI}.${PA}"
          echo "New version: $NEW"
          sed -i -E "s/^(tokencounter\.versionName=).*/\1${NEW}/" gradle.properties
          echo "version=$NEW" >> "$GITHUB_OUTPUT"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          git commit -m "chore(android): bump versionName to $NEW [skip ci]"
          # Rebase onto any concurrent advances to main, then push. Retry once
          # in case main moved between rebase and push.
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push origin HEAD:main && break
            echo "Push attempt $attempt failed; retrying..."
            sleep $((attempt * 5))
          done

      - name: Decode upload keystore
        working-directory: android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > upload-keystore.jks

      - name: Build signed release AAB
        working-directory: android
        env:
          ANDROID_KEYSTORE_FILE: upload-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:bundleRelease --stacktrace

      - name: Clean up keystore
        if: always()
        working-directory: android
        run: rm -f upload-keystore.jks

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: tokencounter-release-${{ steps.bump.outputs.version }}
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      # Publish to Google Play. The service account (play-publisher@...) needs
      # "Release to testing tracks" permission on the app in Play Console.
      # Note: the very FIRST release on a track must be created manually in the
      # Play Console (to accept Play App Signing + complete required
      # declarations). After that, this step automates subsequent uploads.
      # status: completed = full rollout to the track's testers. Use draft if
      # you'd rather review in the Console before releasing.
      - name: Publish to Google Play (${{ github.event.inputs.track }})
        if: ${{ github.event.inputs.publish_to_play == 'true' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: studio.maximumimpact.tokencounter
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: ${{ github.event.inputs.track }}
          status: completed
          releaseName: ${{ steps.bump.outputs.version }}
          changesNotSentForReview: false
