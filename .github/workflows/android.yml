name: Android build & test

on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  pull_request:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android-build-test:
    name: Android assembleDebug + unit tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Show toolchain
        working-directory: android
        run: |
          java -version
          ./gradlew --version

      - name: Assemble debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Unit tests
        working-directory: android
        run: ./gradlew test --stacktrace

  android-instrumentation:
    name: Instrumentation tests (emulator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: connectedDebugAndroidTest
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          working-directory: android
          script: ./gradlew connectedDebugAndroidTest --stacktrace

      - name: Upload instrumentation reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: instrumentation-reports
          path: android/app/build/reports/androidTests/
          if-no-files-found: ignore
