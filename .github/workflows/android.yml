name: Android build & test

on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  pull_request:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android-build-test:
    name: Android assembleDebug + unit tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Show toolchain
        working-directory: android
        run: |
          java -version
          ./gradlew --version

      - name: Assemble debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Unit tests
        working-directory: android
        run: ./gradlew test --stacktrace
