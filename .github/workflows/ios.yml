name: iOS build & test

on:
  push:
    branches: [main]
    paths:
      - "ios/**"
      - ".github/workflows/ios.yml"
      - "scripts/pick_ios_simulator.py"
  pull_request:
    branches: [main]
    paths:
      - "ios/**"
      - ".github/workflows/ios.yml"
      - "scripts/pick_ios_simulator.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ios-build-test:
    name: iOS build & test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Resolve sim destination
        id: sim
        run: |
          set -euo pipefail
          DEST=$(python3 scripts/pick_ios_simulator.py)
          echo "destination=$DEST" >> "$GITHUB_OUTPUT"
          echo "Using destination: $DEST"

      - name: Build & test
        working-directory: ios
        run: |
          set -euo pipefail
          xcodebuild \
            -project TokenTracker.xcodeproj \
            -scheme TokenTracker \
            -destination "${{ steps.sim.outputs.destination }}" \
            -configuration Debug \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO \
            clean test
