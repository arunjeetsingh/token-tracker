name: iOS build & test

# Triggers only when ios/ or this workflow changes. Keeps macOS minutes
# free until we actually have an Xcode project to build.
on:
  push:
    branches: [main]
    paths:
      - "ios/**"
      - ".github/workflows/ios.yml"
  pull_request:
    branches: [main]
    paths:
      - "ios/**"
      - ".github/workflows/ios.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ios-build-test:
    name: iOS build & test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Detect Xcode project
        id: detect
        run: |
          set -euo pipefail
          if [ -f ios/TokenTracker.xcodeproj/project.pbxproj ] \
             || [ -f ios/Package.swift ]; then
            echo "has_project=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_project=false" >> "$GITHUB_OUTPUT"
            echo "no Xcode project / Package.swift in ios/ yet — skipping build"
          fi
      - name: Show toolchain
        if: steps.detect.outputs.has_project == 'true'
        run: |
          xcodebuild -version
          swift --version
      - name: Build & test
        if: steps.detect.outputs.has_project == 'true'
        env:
          SCHEME: TokenTracker
          DESTINATION: "platform=iOS Simulator,name=iPhone 15,OS=latest"
        run: |
          set -euo pipefail
          xcodebuild \
            -project ios/TokenTracker.xcodeproj \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -enableCodeCoverage YES \
            clean test
