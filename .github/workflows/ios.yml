name: iOS build & test

on:
  push:
    branches: [main]
    paths:
      - "ios/**"
      - ".github/workflows/ios.yml"
  pull_request:
    branches: [main]
    paths:
      - "ios/**"
      - ".github/workflows/ios.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ios-build-test:
    name: iOS build & test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Resolve sim destination
        id: sim
        run: |
          set -euo pipefail
          # Pick the first available simulator that matches "iPhone 1" pattern (15/16/17/etc).
          DEST=$(xcrun simctl list devices available --json \
            | python3 -c 'import json,sys; d=json.load(sys.stdin); [print(f"platform=iOS Simulator,name={dev[\"name\"]},OS={k.split(\".\")[-1].replace(\"iOS-\",\"\").replace(\"-\", \".\")}") for k,v in d["devices"].items() if "iOS" in k for dev in v if dev["name"].startswith("iPhone")][0:1]')
          echo "destination=$DEST" >> "$GITHUB_OUTPUT"
          echo "Using destination: $DEST"

      - name: Build & test
        working-directory: ios
        run: |
          set -euo pipefail
          xcodebuild \
            -project TokenTracker.xcodeproj \
            -scheme TokenTracker \
            -destination "${{ steps.sim.outputs.destination }}" \
            -configuration Debug \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO \
            clean test
